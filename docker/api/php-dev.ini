; PHP tuning for dev inside Docker on Windows/macOS, where bind-mounted source
; lives on the host filesystem and every stat() crosses a VM boundary.
;
; The big win is realpath_cache: Symfony touches thousands of unique paths per
; request, and PHP's default 16K cache holds only ~100 entries, so almost every
; require_once stats the host filesystem fresh. Bumping the cache + bumping
; opcache's revalidate window from "every request" to "every 2s" eliminates
; most of that cost while keeping dev edits visible within a couple seconds.

; 512M is generous but cheap in dev; cache:clear and profiler can blow past 128M default.
memory_limit = 512M

realpath_cache_size = 4096K
realpath_cache_ttl = 600

opcache.enable = 1
opcache.enable_cli = 0
opcache.validate_timestamps = 1
opcache.revalidate_freq = 2
opcache.memory_consumption = 256
opcache.max_accelerated_files = 20000
opcache.interned_strings_buffer = 16
opcache.fast_shutdown = 1
