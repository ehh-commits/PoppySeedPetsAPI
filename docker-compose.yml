services:
  db:
    # Aurora MySQL 3.08.x in prod tracks MySQL 8.0.x — pin to a specific minor so
    # migration generation behaves the same on every dev's machine.
    image: mysql:8.0.39
    environment:
      MYSQL_ROOT_PASSWORD: "b0ar!!"
      MYSQL_DATABASE: poppyseedpets
    volumes:
      - mysql_data:/var/lib/mysql
      # Any *.sql files dropped here are auto-imported by the MySQL image on first start.
      # Use it to load the proprietary game-data dump (items, recipes, NPCs, etc).
      - ./db/seed:/docker-entrypoint-initdb.d:ro
    ports:
      # Host-side port for GUI clients (TablePlus, DBeaver, MySQL Workbench).
      # Default 3306; override in .env if you have a native MySQL/MariaDB on that port.
      # The containers always talk to each other on 3306 internally — this only changes host mapping.
      - "${DB_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pb0ar!!"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    # No host port published — only the api service talks to redis, by service name.

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    environment:
      APP_ENV: dev
      APP_SECRET: "apples and oranges and pears and bears"
      DATABASE_URL: "mysql://root:b0ar!!@db:3306/poppyseedpets?serverVersion=8.0.39"
      READONLY_DATABASE_URL: "mysql://root:b0ar!!@db:3306/poppyseedpets?serverVersion=8.0.39"
      REDIS_URL: "redis://redis"
      CORS_ALLOW_ORIGIN: "^.*$$"
    volumes:
      - ./api:/app
      # Anonymous-style named volumes for high-churn dirs — keeps them inside the
      # container's overlay FS instead of on the bind mount, which is dramatically
      # faster on Windows (WSL2 ↔ NTFS crossings are slow with thousands of files).
      - api_vendor:/app/vendor
      - api_var:/app/var
      # TLS certs from the repo root (same ones ng serve uses).
      - ./dev.pem:/etc/nginx/certs/dev.pem:ro
      - ./dev.key:/etc/nginx/certs/dev.key:ro
    ports:
      # API port is hardcoded at 8000 because webapp/src/environments/environment.ts
      # hardcodes https://localhost:8000. Making this configurable would require
      # threading the value through to the Angular build — not worth the complexity
      # for the dev workflow. If you have a conflict on 8000, stop whatever else
      # owns it, or open a ticket to make environment.ts read a runtime config.
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  webapp:
    build:
      context: .
      dockerfile: docker/webapp/Dockerfile
    volumes:
      # Mount the whole repo so angular.json's ../dev.key / ../dev.pem and
      # ../proprietary-assets/ references resolve naturally inside the container.
      - .:/workspace
      - webapp_node_modules:/workspace/webapp/node_modules
    ports:
      # Host-side port for the Angular dev server. Default 4200; override in .env if conflicted.
      - "${WEBAPP_PORT:-4200}:4200"
    working_dir: /workspace/webapp
    # npm ci          : strict, lockfile-only install — errors if package.json / package-lock.json
    #                   drift, never silently mutates the lockfile. To change deps intentionally,
    #                   see "Adding or updating dependencies" in docs/Installing and Running.md.
    # --host 0.0.0.0  : listen on the container's external interface
    # --poll 2000     : polling-based file watcher (bind-mount inotify is unreliable on Windows)
    # --allowed-hosts : trust the Host header when the browser hits https://localhost:4200
    command: sh -c "npm ci && ng serve --host 0.0.0.0 --poll 2000 --allowed-hosts all"

volumes:
  mysql_data:
  api_vendor:
  api_var:
  webapp_node_modules:
